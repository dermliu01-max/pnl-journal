        let r = store.get("inc_records");
        let a = store.get("inc_actual");
        if (!r) { r = SEED.recs; store.set("inc_records", r); }
        if (!a) { a = SEED.actual; store.set("inc_actual", a); }
        setRecs(r); 
        setActual(a); 
        setReady(true);
      }, []);

      const save = (next) => { setRecs(next); store.set("inc_records", next); };

      if (!ready || !recs) return (
        <div style={{minHeight:"100vh",background:C.paper,display:"grid",placeItems:"center",fontFamily:"system-ui"}}>
          <div style={{color:C.muted}}>載入中…</div>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:C.paper,color:C.ink,
          fontFamily:'"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif',
          WebkitFontSmoothing:"antialiased", paddingBottom:78}}>
          <Header />
          <div style={{maxWidth:560,margin:"0 auto",padding:"0 16px"}}>
            {tab === "log" && <LogView recs={recs} save={save} />}
            {tab === "month" && <MonthView recs={recs} actual={actual} setActual={setActual} />}
            {tab === "trend" && <TrendView recs={recs} actual={actual} />}
          </div>
          <TabBar tab={tab} setTab={setTab} />
        </div>
      );
    }

    function Header() {
      return (
        <div style={{padding:"18px 16px 10px",maxWidth:560,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <div style={{width:9,height:9,borderRadius:9,background:C.jade,transform:"translateY(-1px)"}}/>
            <h1 style={{margin:0,fontSize:20,fontWeight:800,letterSpacing:"-0.01em"}}>薪資收入紀錄</h1>
            <span style={{marginLeft:"auto",fontSize:11,color:C.muted,letterSpacing:".08em"}}>INCOME LEDGER</span>
          </div>
        </div>
      );
    }

    function bigNum(n) { return { fontFamily:'"SF Mono",ui-monospace,"Roboto Mono",monospace', fontVariantNumeric:"tabular-nums", fontWeight:700 }; }

    function LogView({ recs, save }) {
      const today = new Date().toISOString().slice(0,10);
      const [date, setDate] = useState(today);
      const existing = recs.find(r => r.d === date);
      const [draft, setDraft] = useState(existing || blankRec(today));
      const [flash, setFlash] = useState("");

      useEffect(() => { setDraft(recs.find(r=>r.d===date) || blankRec(date)); }, [date, recs]);

      const setFee = (i,v) => setDraft(d => ({...d, f: d.f.map((x,j)=>j===i?(v===""?0:+v):x)}));
      const setPpf = (i,v) => setDraft(d => ({...d, p: d.p.map((x,j)=>j===i?(v===""?0:+v):x)}));

      const ds = diagSum(draft), ps = ppfSum(draft), tot = ds + ps;

      const onSave = () => {
        const r = {...draft, w:"W"+wdFromDate(date), d:date};
        const next = recs.filter(x=>x.d!==date);
        if (dayTotal(r)>0 || r.n) next.push(r);
        next.sort((a,b)=>a.d<b.d?-1:1);
        save(next);
        setFlash("已儲存"); setTimeout(()=>setFlash(""),1400);
      };
      const onDelete = () => { save(recs.filter(x=>x.d!==date)); setDraft(blankRec(date)); setFlash("已刪除"); setTimeout(()=>setFlash(""),1400); };

      const month = ym(date);
      const monthRecs = recs.filter(r=>ym(r.d)===month).sort((a,b)=>a.d<b.d?-1:1);
      let run=0;
      const withRun = monthRecs.map(r=>{ run+=dayTotal(r); return {...r,run}; });
      const mDiag = monthRecs.reduce((a,r)=>a+diagSum(r),0);
      const mPpf = monthRecs.reduce((a,r)=>a+ppfSum(r),0);

      // 動態過濾：依據選擇的日期決定顯示哪些院所
      const activeFEE = FEE.filter(c => {
        if (c.k === 4) return date <= "2025-07-31";
        if (c.k === 1) return date >= "2025-09-01";
        return true;
      });

      const activePPF = PPF.filter(c => {
        if (c.k === 6) return date <= "2025-07-31";
        if (c.k === 3) return date >= "2025-09-01";
        return true;
      });

      return (
        <div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
            <button onClick={()=>setDate(shift(date,-1))} style={navBtn}>‹</button>
            <label style={{flex:1,position:"relative"}}>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{width:"100%",boxSizing:"border-box",padding:"11px 12px",borderRadius:12,border:`1px solid ${C.line}`,
                  background:C.card,fontSize:15,color:C.ink,fontFamily:"inherit"}}/>
            </label>
            <button onClick={()=>setDate(shift(date,1))} style={navBtn}>›</button>
            <div style={{width:42,textAlign:"center",fontSize:13,color:C.muted}}>週{WD[wdFromDate(date)]}</div>
          </div>

          <div style={{background:C.ink,color:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:8,
            boxShadow:"0 10px 24px -16px rgba(20,35,46,.6)"}}>
            <div style={{fontSize:12,color:"#9DB0A8",letterSpacing:".06em"}}>當日總計</div>
            <div style={{...bigNum(),fontSize:38,lineHeight:1.1,marginTop:2}}>
              <span style={{fontSize:18,opacity:.6,marginRight:2}}>$</span>{nf(tot)}
            </div>
            <div style={{display:"flex",gap:6,marginTop:12}}>
              <Bar2 label="診費" val={ds} total={tot} color={C.jade}/>
              <Bar2 label="PPF" val={ps} total={tot} color={C.gold}/>
            </div>
          </div>

          <Section title="診費">
            <Grid>{activeFEE.map(c => <NumCell key={c.k} label={c.short} value={draft.f[c.k]} onChange={v=>setFee(c.k,v)} accent={C.jade}/>)}</Grid>
          </Section>
          <Section title="PPF 獎金">
            <Grid>{activePPF.map(c => <NumCell key={c.k} label={c.name} value={draft.p[c.k]} onChange={v=>setPpf(c.k,v)} accent={C.gold}/>)}</Grid>
          </Section>
          <Section title="備註">
            <textarea value={draft.n} onChange={e=>setDraft(d=>({...d,n:e.target.value}))}
              placeholder="可貼計算式,例:咬肌825+肉毒3000*25%"
              style={{width:"100%",boxSizing:"border-box",minHeight:56,padding:"10px 12px",borderRadius:12,
                border:`1px solid ${C.line}`,background:C.card,fontSize:14,resize:"vertical",fontFamily:"inherit",color:C.ink}}/>
          </Section>

          <div style={{display:"flex",gap:10,margin:"4px 0 22px"}}>
            <button onClick={onSave} style={{flex:1,padding:"14px",borderRadius:13,border:"none",background:C.jade,
              color:"#fff",fontSize:16,fontWeight:700,fontFamily:"inherit",boxShadow:"0 8px 18px -10px "+C.jade}}>
              {flash || (existing ? "更新這天" : "儲存這天")}
            </button>
            {existing && <button onClick={onDelete} style={{padding:"14px 16px",borderRadius:13,border:`1px solid ${C.coralSoft}`,
              background:"#fff",color:C.coral,fontSize:14,fontFamily:"inherit"}}>刪除</button>}
          </div>

          <div style={{display:"flex",alignItems:"baseline",marginBottom:8}}>
            <h2 style={{margin:0,fontSize:15,fontWeight:700}}>{month.slice(0,4)}年{month.slice(4)}月</h2>
            <span style={{marginLeft:"auto",fontSize:13,color:C.muted}}>診費 {nf(mDiag)} ‧ PPF {nf(mPpf)} ‧ <b style={{color:C.ink}}>合計 {nf(mDiag+mPpf)}</b></span>
          </div>
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.line}`,overflow:"hidden",marginBottom:8}}>
            {withRun.length===0 && <div style={{padding:18,color:C.muted,fontSize:14,textAlign:"center"}}>這個月還沒有紀錄</div>}
            {withRun.slice().reverse().map((r,i)=>(
              <button key={r.d} onClick={()=>setDate(r.d)}
                style={{display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",
                  padding:"10px 14px",border:"none",borderTop:i?`1px solid ${C.line}`:"none",
                  background:r.d===date?C.jadeSoft:"transparent",fontFamily:"inherit",cursor:"pointer"}}>
                <div style={{width:30,textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:700,...bigNum()}}>{(+r.d.slice(8))}</div>
                  <div style={{fontSize:10,color:C.muted}}>{WD[wdFromDate(r.d)]}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{...bigNum(),fontSize:15}}>{nf(dayTotal(r))}</div>
                  <div style={{fontSize:11,color:C.muted}}>診 {nf(diagSum(r))} · P {nf(ppfSum(r))}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:C.muted}}>累計</div>
                  <div style={{...bigNum(),fontSize:13,color:C.jade}}>{nf(r.run)}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function Bar2({label,val,total,color}) {
      const pct = total? Math.round(val/total*100):0;
      return (
        <div style={{flex:val||1,minWidth:54}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#B7C4BD",marginBottom:3}}>
            <span>{label}</span><span style={{...bigNum(),fontWeight:600}}>{nf(val)}</span>
          </div>
          <div style={{height:5,borderRadius:5,background:"#2B3A44",overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:color}}/>
          </div>
        </div>
      );
    }

    function Section({title,children}) {
      return <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:C.muted,fontWeight:600,letterSpacing:".04em",margin:"0 2px 7px"}}>{title}</div>
        {children}
      </div>;
    }
    
    function Grid({children}) { 
      return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{children}</div>; 
    }

    function NumCell({label,value,onChange,accent}) {
      const [foc,setFoc]=useState(false);
      return (
        <label style={{display:"block",background:C.card,border:`1px solid ${foc?accent:C.line}`,borderRadius:12,
          padding:"8px 11px",transition:"border-color .15s"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label}</div>
          <input type="number" inputMode="numeric" value={value||""} placeholder="0"
            onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
            onChange={e=>onChange(e.target.value)}
            style={{width:"100%",border:"none",outline:"none",background:"transparent",fontSize:17,
              ...bigNum(),color:value?C.ink:"#C7CDD0",padding:0}}/>
        </label>
      );
    }

    function MonthView({recs,actual,setActual}) {
      const months = useMemo(()=>{
        const m={};
        recs.forEach(r=>{const k=ym(r.d); if(!m[k])m[k]={diag:0,ppf:0}; m[k].diag+=diagSum(r); m[k].ppf+=ppfSum(r);});
        return Object.keys(m).sort().map(k=>({k,...m[k],est:m[k].diag+m[k].ppf,act:actual[k]}));
      },[recs,actual]);
      const [open,setOpen]=useState(null);
      const tot = months.reduce((a,m)=>({diag:a.diag+m.diag,ppf:a.ppf+m.ppf,est:a.est+m.est,act:a.act+(m.act||0)}),{diag:0,ppf:0,est:0,act:0});

      return (
        <div style={{paddingTop:4}}>
          <div style={{background:C.ink,color:"#fff",borderRadius:16,padding:"14px 16px",marginBottom:14,display:"flex",gap:14}}>
            <Stat label="累計診費" val={tot.diag} c="#7FD8C4"/>
            <Stat label="累計PPF" val={tot.ppf} c={C.gold}/>
            <Stat label="總計" val={tot.est} c="#fff" big/>
          </div>
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.line}`,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"64px 1fr 1fr 1fr",fontSize:11,color:C.muted,
              padding:"9px 12px",borderBottom:`1px solid ${C.line}`,background:"#FAFAF7"}}>
              <span>月份</span><span style={{textAlign:"right"}}>總計</span><span style={{textAlign:"right"}}>實際入帳</span><span style={{textAlign:"right"}}>差異</span>
            </div>
            {months.slice().reverse().map(m=>{
              const diff = m.act!=null ? m.act-m.est : null;
              return (
              <div key={m.k}>
                <button onClick={()=>setOpen(open===m.k?null:m.k)} style={{display:"grid",gridTemplateColumns:"64px 1fr 1fr 1fr",
                  width:"100%",alignItems:"center",padding:"11px 12px",border:"none",borderTop:`1px solid ${C.line}`,
                  background:open===m.k?C.jadeSoft:"#fff",fontFamily:"inherit",cursor:"pointer"}}>
                  <span style={{textAlign:"left",fontSize:13,fontWeight:600}}>{m.k.slice(2,4)}/{m.k.slice(4)}</span>
                  <span style={{textAlign:"right",...bigNum(),fontSize:14}}>{nf(m.est)}</span>
                  <span style={{textAlign:"right",...bigNum(),fontSize:13,color:m.act!=null?C.ink:"#CBD0D2"}}>{m.act!=null?nf(m.act):"—"}</span>
                  <span style={{textAlign:"right",...bigNum(),fontSize:13,color:diff==null?"#CBD0D2":diff>=0?C.jade:C.coral}}>
                    {diff==null?"—":(diff>=0?"+":"")+nf(diff)}</span>
                </button>
                {open===m.k && <MonthDetail recs={recs.filter(r=>ym(r.d)===m.k)} m={m} actual={actual} setActual={setActual}/>}
              </div>);
            })}
          </div>
          <p style={{fontSize:11,color:C.muted,lineHeight:1.6,marginTop:14}}>
            差異 = 實際入帳 − 估算總計(診費+PPF)。差異來自入帳時點、扣稅與二代健保等。點月份可展開當月每日明細,並可手動修改實際入帳金額。
          </p>
        </div>
      );
    }
    
    function Stat({label,val,c,big}) {
      return <div style={{flex:big?1.2:1}}>
        <div style={{fontSize:11,color:"#9DB0A8"}}>{label}</div>
        <div style={{...bigNum(),fontSize:big?22:18,color:c,marginTop:2}}>{nf(val)}</div>
      </div>;
    }
    
    function MonthDetail({recs,m,actual,setActual}) {
      const days=recs.slice().sort((a,b)=>a.d<b.d?-1:1);
      const [edit,setEdit]=useState(false);
      const [v,setV]=useState(m.act||"");
      const saveAct=()=>{ const n={...actual,[m.k]:v===""?undefined:+v}; if(v==="")delete n[m.k]; setActual(n); store.set("inc_actual",n); setEdit(false); };
      return (
        <div style={{background:"#FBFAF6",borderTop:`1px solid ${C.line}`,padding:"6px 12px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 2px"}}>
            <span style={{fontSize:12,color:C.muted}}>實際入帳</span>
            {edit ? <>
              <input type="number" value={v} onChange={e=>setV(e.target.value)} autoFocus
                style={{flex:1,...bigNum(),fontSize:14,padding:"6px 8px",borderRadius:8,border:`1px solid ${C.jade}`}}/>
              <button onClick={saveAct} style={{padding:"6px 12px",borderRadius:8,border:"none",background:C.jade,color:"#fff",fontSize:13,fontFamily:"inherit"}}>存</button>
            </> : <>
              <span style={{...bigNum(),fontSize:14}}>{m.act!=null?nf(m.act):"未填"}</span>
              <button onClick={()=>setEdit(true)} style={{marginLeft:"auto",padding:"5px 10px",borderRadius:8,border:`1px solid ${C.line}`,background:"#fff",fontSize:12,color:C.muted,fontFamily:"inherit"}}>修改</button>
            </>}
          </div>
          {days.map(r=>(
            <div key={r.d} style={{display:"flex",gap:8,padding:"5px 2px",fontSize:12,borderTop:`1px solid ${C.line}`}}>
              <span style={{width:42,color:C.muted}}>{(+r.d.slice(8))}日{WD[wdFromDate(r.d)]}</span>
              <span style={{...bigNum(),width:64,textAlign:"right"}}>{nf(dayTotal(r))}</span>
              <span style={{flex:1,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.n||"—"}</span>
            </div>
          ))}
        </div>
      );
    }

    function TrendView({recs,actual}) {
      const data = useMemo(()=>{
        const m={};
        recs.forEach(r=>{const k=ym(r.d); if(!m[k])m[k]={diag:0,ppf:0}; m[k].diag+=diagSum(r); m[k].ppf+=ppfSum(r);});
        return Object.keys(m).sort().map(k=>({m:k.slice(2,4)+"/"+k.slice(4),diag:m[k].diag,ppf:m[k].ppf,total:m[k].diag+m[k].ppf,act:actual[k]||null}));
      },[recs,actual]);
      
      const clinicTot = useMemo(()=>{
        const t=[0,0,0,0,0]; recs.forEach(r=>FEE.forEach(c=>t[c.k]+=(+r.f[c.k]||0)));
        return FEE.map(c=>({name:c.name,val:t[c.k]})).filter(x=>x.val>0).sort((a,b)=>b.val-a.val);
      },[recs]);
      
      const maxC = Math.max(...clinicTot.map(c=>c.val),1);
      const avg = data.length? Math.round(data.reduce((a,d)=>a+d.total,0)/data.length):0;

      return (
        <div style={{paddingTop:4}}>
          <Card title="每月總計" sub={`平均 ${nf(avg)} / 月`}>
            <ResponsiveContainer width="100%" height={190}>
              <BarChart data={data} margin={{top:6,right:4,left:-18,bottom:0}}>
                <CartesianGrid vertical={false} stroke={C.line}/>
                <XAxis dataKey="m" tick={{fontSize:9,fill:C.muted}} interval={2} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:9,fill:C.muted}} tickFormatter={v=>v/1000+"k"} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>nf(v)} labelStyle={{color:C.ink}} contentStyle={{borderRadius:10,border:`1px solid ${C.line}`,fontSize:12}}/>
                <Bar dataKey="total" radius={[3,3,0,0]}>{data.map((d,i)=><Cell key={i} fill={C.jade}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card title="診費 vs PPF 趨勢">
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={data} margin={{top:6,right:6,left:-18,bottom:0}}>
                <CartesianGrid vertical={false} stroke={C.line}/>
                <XAxis dataKey="m" tick={{fontSize:9,fill:C.muted}} interval={2} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:9,fill:C.muted}} tickFormatter={v=>v/1000+"k"} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>nf(v)} contentStyle={{borderRadius:10,border:`1px solid ${C.line}`,fontSize:12}}/>
                <Line dataKey="diag" name="診費" stroke={C.jade} strokeWidth={2} dot={false}/>
                <Line dataKey="ppf" name="PPF" stroke={C.gold} strokeWidth={2} dot={false}/>
              </LineChart>
            </ResponsiveContainer>
            <Legend items={[["診費",C.jade],["PPF",C.gold]]}/>
          </Card>

          <Card title="各院所診費佔比(全期)">
            <div style={{display:"flex",flexDirection:"column",gap:9,marginTop:4}}>
              {clinicTot.map(c=>(
                <div key={c.name}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span>{c.name}</span><span style={{...bigNum(),color:C.muted}}>{nf(c.val)}</span>
                  </div>
                  <div style={{height:8,borderRadius:8,background:C.jadeSoft,overflow:"hidden"}}>
                    <div style={{height:"100%",width:(c.val/maxC*100)+"%",background:C.jade,borderRadius:8}}/>
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    }
    
    function Card({title,sub,children}) {
      return <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.line}`,padding:"12px 12px 8px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"baseline",marginBottom:6,padding:"0 2px"}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700}}>{title}</h3>
          {sub && <span style={{marginLeft:"auto",fontSize:11,color:C.muted}}>{sub}</span>}
        </div>
        {children}
      </div>;
    }
    
    function Legend({items}) {
      return <div style={{display:"flex",gap:14,justifyContent:"center",fontSize:11,color:C.muted,paddingTop:4}}>
        {items.map(([t,c])=><span key={t} style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:10,height:3,background:c,borderRadius:3}}/>{t}</span>)}
      </div>;
    }

    const navBtn = { width:38,height:42,borderRadius:11,border:"1px solid "+C.line,background:"#fff",fontSize:20,color:C.muted,fontFamily:"inherit",cursor:"pointer" };
    function TabBar({tab,setTab}) {
      const items=[["log","登記","✎"],["month","月報表","▦"],["trend","趨勢","◔"]];
      return (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,.92)",
          backdropFilter:"blur(8px)",borderTop:`1px solid ${C.line}`,display:"flex",justifyContent:"center",zIndex:20}}>
          <div style={{display:"flex",width:"100%",maxWidth:560}}>
            {items.map(([k,label,icon])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0 14px",border:"none",background:"none",
                color:tab===k?C.jade:C.muted,fontFamily:"inherit",cursor:"pointer"}}>
                <div style={{fontSize:18,lineHeight:1}}>{icon}</div>
                <div style={{fontSize:11,marginTop:3,fontWeight:tab===k?700:400}}>{label}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }
    
    function shift(d,n) { const x=new Date(d+"T00:00:00"); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
